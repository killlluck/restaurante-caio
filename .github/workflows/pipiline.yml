name: integracao continua



on:

  push:

    branches: [ "developer" ]

  pull_request:

    branches: [ "developer" ]



jobs:

  estagio_build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout do código

        uses: actions/checkout@v4



      - name: Configurar Node.js 18

        uses: actions/setup-node@v4

        with:

          node-version: '18'



      - name: Instalar dependências

        run: npm install



      - name: Verificar sintaxe do projeto

        run: node --check index.js



  estagio_lint:

    runs-on: ubuntu-latest

    needs: estagio_build

    steps:

      - name: Checkout do código

        uses: actions/checkout@v4



      - name: Configurar Node.js 18

        uses: actions/setup-node@v4

        with:

          node-version: '18'



      - name: Gerar lockfile temporário

        run: npm install --package-lock-only



      - name: Instalar dependências

        run: npm install



      - name: Criar configuração temporária do ESLint

        run: |

          cat > eslint.config.js <<'EOF'

          module.exports = [

            {

              files: ["**/*.js"],

              ignores: ["node_modules/**"],

              languageOptions: {

                ecmaVersion: 2021,

                sourceType: "commonjs"

              },

              rules: {

                "no-unused-vars": "warn",

                "no-undef": "error"

              }

            }

          ];

          EOF



      - name: Rodar lint

        run: npx eslint .



      - name: Rodar build

        run: node --check index.js
